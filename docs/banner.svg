<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="420" viewBox="0 0 1280 420" role="img" aria-label="RedCard Studio — 小红书图文工作台">
  <defs>
    <style>
      .serif { font-family: "Songti SC", "STSong", "Source Han Serif SC", Georgia, "Times New Roman", serif; }
      .sans  { font-family: "PingFang SC", "Helvetica Neue", Arial, sans-serif; }
      .mono  { font-family: "SF Mono", "JetBrains Mono", Menlo, monospace; }
    </style>
  </defs>

  <!-- background -->
  <rect width="1280" height="420" fill="#F4EEDD"/>
  <rect x="0" y="0" width="1280" height="420" fill="none" stroke="#1A1A1A" stroke-opacity="0.08" stroke-width="2"/>

  <!-- top rule -->
  <g transform="translate(80,70)">
    <rect x="0" y="-16" width="78" height="26" rx="4" fill="#B82828"/>
    <text x="39" y="2" class="mono" font-size="13" letter-spacing="2" fill="#F4EEDD" text-anchor="middle">VOL.001</text>
    <text x="98" y="2" class="mono" font-size="13" letter-spacing="3" fill="#6B6256">WORKBENCH · MMXXVI</text>
    <line x1="350" y1="-4" x2="1120" y2="-4" stroke="#1A1A1A" stroke-opacity="0.18" stroke-width="1.5"/>
  </g>

  <!-- headline -->
  <g transform="translate(78,200)">
    <text x="0" y="0" class="serif" font-size="104" font-weight="700" fill="#1A1A1A">小红书图文</text>
    <rect x="556" y="-78" width="300" height="100" rx="8" fill="#B82828"/>
    <text x="706" y="2" class="serif" font-size="92" font-style="italic" font-weight="700" fill="#F4EEDD" text-anchor="middle">工作台</text>
  </g>

  <!-- tagline -->
  <text x="80" y="278" class="serif" font-size="26" font-style="italic" fill="#3A352C">From long-form thinking to editorial cards, AI cover, and launch-ready export.</text>
  <text x="80" y="312" class="sans" font-size="17" fill="#6B6256">把一篇长文整理成可发布的小红书图文项目：规则沉淀，素材留痕，输出可复用。</text>

  <!-- workflow steps -->
  <g transform="translate(80,372)" class="sans" font-size="18">
    <text x="0" y="0"><tspan class="mono" fill="#B82828" font-size="15">01</tspan><tspan dx="10" fill="#1A1A1A">长文</tspan></text>
    <text x="150" y="0"><tspan class="mono" fill="#B82828" font-size="15">02</tspan><tspan dx="10" fill="#1A1A1A">文字卡片</tspan></text>
    <text x="340" y="0"><tspan class="mono" fill="#B82828" font-size="15">03</tspan><tspan dx="10" fill="#1A1A1A">AI 封面</tspan></text>
    <text x="510" y="0"><tspan class="mono" fill="#B82828" font-size="15">04</tspan><tspan dx="10" fill="#1A1A1A">导出发布</tspan></text>
    <text x="1120" y="0" class="mono" font-size="13" letter-spacing="2" fill="#9A9384" text-anchor="end">REDCARD STUDIO</text>
  </g>
</svg>
